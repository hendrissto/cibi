<button class="submit" onclick="submitOrder()">
KIRIM ORDER
</button>

<p id="msg"></p>

<script>

// ✅ semua menu sudah benar
const qty = {
    cibiren: 0,
    cibiamer: 0,
    cibipeach: 0,
    cibicaramel: 0,
    cibihon: 0,
    cibirenltr: 0,
    cibichoc: 0,
    cibicookies: 0
};

function plus(item){
    qty[item]++;
    document.getElementById(item).innerText = qty[item];
}

function minus(item){
    if(qty[item] > 0){
        qty[item]--;
        document.getElementById(item).innerText = qty[item];
    }
}

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
}

async function sendToGoogle(menu, jumlah){

    const body = new URLSearchParams();
    body.append("entry.960002011", menu);
    body.append("entry.1329929177", jumlah);
    body.append("entry.642292741", "Qris");

    await fetch(
        "https://docs.google.com/forms/d/e/1FAIpQLSeht3QRd8dP-A8xqM45exFObietV3Lj7BLqHgUQdU5qu3iZPA/formResponse",
        {
            method: "POST",
            mode: "no-cors",
            body: body
        }
    );
}

async function submitOrder(){

    const orders = [];

    for (const item in qty) {
        for (let i = 0; i < qty[item]; i++) {
            orders.push(item.toUpperCase());
        }
    }

    if (orders.length === 0) {
        alert("Pilih menu dulu");
        return;
    }

    document.getElementById("msg").innerText = "Mengirim order...";

    try {

        for (const item of orders) {
            await sendToGoogle(item, 1);
            await sleep(250);
        }

        document.getElementById("msg").innerText = "Order berhasil dikirim ✅";

        // reset
        for (const item in qty) {
            qty[item] = 0;
            document.getElementById(item).innerText = 0;
        }

    } catch (err) {
        console.log(err);
        document.getElementById("msg").innerText = "Gagal kirim ❌";
    }
}

</script>
